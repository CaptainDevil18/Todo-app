{% extends 'base.html' %}
{% block body %}
<div class="container-login">
    <form method="POST" action="/update/{{todo.sno}}">
        <div class="mb-3 my-3 mx-5">
            <h2>Update the todo</h2>
            <label for="exampleInputEmail1" class="form-label">Todo Title</label>
            <input type="text" class="form-control" name="title" id="exampleInputEmail1" value="{{todo.title}}" aria-describedby="emailHelp">
        </div>
        <div class="mb-3 mx-5">
            <label for="desc" class="form-label">Description</label>
            <input type="text" class="form-control me-5" name="desc" value="{{todo.desc}}" id="desc">
        </div>
        <button type="submit" class="btn btn-dark mx-5 ">Submit</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
{% endblock body %}
